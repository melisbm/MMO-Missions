<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Missions MMO</h1>

    <main>

        <div class="addTaskContainer">
            <!--https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/input-->
            <form action="submit">
                <input class="input" type="text" placeholder="Ciutat origen">
                <input class="input" type="text" placeholder="Ciutat destí">
                <input class="input" type="number" placeholder="Experiència">
                <input class="input" type="number" placeholder="Or">

                <input class="input" type="text" placeholder="Persona destí">

                <select multiple>
                    <option>Ganivet</option>
                    <option>Destral</option>
                    <option>Llança</option>
                    <option>Espasa</option>
                    <option>Dagà</option>
                    <option>Arc</option>
                    <option>Escut</option>
                    <option>Armadura</option>
                </select>

                <textarea placeholder="Descripció"></textarea>
                <input class="input" type="number" placeholder="Nivell mínim">
                <input class="input" type="date">

            </form>
        </div>
        
        <div>
            <ol></ol>
            <p>No missions pending...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
