<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>MMO Missions</h1>

    <main>

        <div class="addTaskContainer">
            <!--https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/input-->
            <form action="submit">

                <input name="origin-city" class="input" type="text" placeholder="Ciutat origen" maxlength="50">
                <input name="destination-city" class="input" type="text" placeholder="Ciutat destí" maxlength="50">
                <input name="xp" class="input" type="number" placeholder="Experiència" min="0">
                <input name="gold"class="input" type="number" placeholder="Or" min="0">
                <input name="destination-person" class="input" type="text" placeholder="Persona destí" maxlength="50">

                <select>
                    <option>Ganivet</option>
                    <option>Destral</option>
                    <option>Llança</option>
                    <option>Espasa</option>
                    <option>Dagà</option>
                    <option>Arc</option>
                    <option>Escut</option>
                    <option>Armadura</option>
                </select>

                <textarea placeholder="Descripció" maxlength="250"></textarea>
                <input class="input" type="number" placeholder="Nivell mínim" min="0">

                <input class="input" name="initial-date" type="date">
                <input class="input" name="end-date" type="date">
                <button>Add Mission</button>
            </form>
        </div>
        
        <div>
            <ol></ol>
            <p>No missions pending...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
